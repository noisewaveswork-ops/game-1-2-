<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Hell Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <!-- Было 800x600, стало 400x600 -->
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="lives">Lives: 3</div>
            <div id="bombs">Bombs: 3</div>
        </div>
        <div id="gameOver" class="hidden">
            <h2>Игра окончена!</h2>
            <p id="finalScore"></p>
            <button id="restartButton">Играть снова</button>
        </div>
        <div id="startScreen">
            <h1>BULLET HELL</h1>
            <p>Управление: стрелки или WASD</p>
            <p>Стрельба: пробел (зажать)</p>
            <p>Бомба: клавиша B</p>
            <p>Соберите все монеты чтобы победить!</p>
            <button id="startButton">НАЧАТЬ ИГРУ</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bullet Hell Shooter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <!-- Видео-фон (бесшовная анимация) -->
        <video id="bgVideo" autoplay muted loop playsinline 
           style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; border: 2px solid #333;">
            <source src="assets/bg.mp4" type="video/mp4">
        <!-- Если видео не загрузится, будет тёмный фон -->
        </video>
        
        <canvas id="gameCanvas"></canvas>

        <!-- Фоновая музыка -->
        <audio id="bgMusic" loop preload="auto">
            <source src="bgm.mp3" type="audio/mpeg">
        </audio>

        <!-- Стартовое меню -->
        <div id="startScreen">
            <h1>BULLET HELL</h1>
            <div id="desktopControls" class="controls">
                <p>🖱️ Мышь — движение</p>
                <p>🔫 Автострельба (жёлтые пули)</p>
                <p>💣 X — бомба</p>
                <p>🟣 Зажать Z — самонаводящиеся пули (слабый урон)</p>
            </div>
            <div id="mobileControls" class="controls hidden">
                <p>👆 Водите пальцем — корабль над пальцем</p>
                <p>🔫 Автострельба (жёлтые пули)</p>
                <p>💣 Короткое нажатие — бомба</p>
                <p>🟣 Зажать двумя пальцами — самонаводящиеся пули (слабый урон)</p>
            </div>
            <button id="startButton">ИГРАТЬ</button>
        </div>
        <!-- Экран окончания игры -->
        <div id="gameOver" class="hidden">
            <h2>Игра окончена!</h2>
            <p id="finalScore"></p>
            <button id="restartButton">Играть снова</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
